rules:
  - RULE-SET,Lan,DIRECT
  - RULE-SET,Lan_IP,DIRECT,no-resolve
  - RULE-SET,Direct,DIRECT               #直连规则
  - RULE-SET,AWAvenue_Ads_Rule,ADS       #去广告
#  - RULE-SET,Anti-AD,ADS                #拦截更严格，默认用秋风去广告
  - RULE-SET,Game,DIRECT          #游戏，走直连
  - RULE-SET,Game_IP,DIRECT
  - RULE-SET,GameDownload,DIRECT
  - RULE-SET,GoogleFCM,DIRECT
  - RULE-SET,GoogleFCM_IP,DIRECT
  - RULE-SET,Microsoft,DIRECT
  - DOMAIN-SUFFIX,immersivetranslate.com,DIRECT
  - RULE-SET,ChinaMax,DIRECT
  - RULE-SET,ChinaMax_IP,DIRECT

  - RULE-SET,Emby,Emby
  - RULE-SET,Telegram,PROXY
  - RULE-SET,Telegram_IP,PROXY,no-resolve
  - RULE-SET,Global,PROXY
  - RULE-SET,Global_IP,PROXY

  - MATCH,PROXY
