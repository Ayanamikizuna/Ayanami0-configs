rule-anchor:
  IPCIDR: &IPCIDR
    {type: http, behavior: ipcidr, format: mrs, interval: 86400}
  Domain: &Domain
    {type: http, behavior: domain, format: mrs, interval: 86400}

rule-providers:


###国内/私有###

  ChinaMax:
    <<: *Domain
    path: ./rules/ChinaMax.mrs
    url: "https://raw.githubusercontent.com/Ayanamikizuna/Rule-for-OCD/master/rule/Clash/ChinaMax/ChinaMax.mrs"
  ChinaMax_IP:
    <<: *IPCIDR
    path: ./rules/ChinaMax_IP.mrs
    url: "https://raw.githubusercontent.com/Ayanamikizuna/Rule-for-OCD/master/rule/Clash/ChinaMax/ChinaMax_IP.mrs"
  Lan:
    <<: *Domain
    path: ./rules/Lan.mrs
    url: "https://raw.githubusercontent.com/Ayanamikizuna/Rule-for-OCD/master/rule/Clash/Lan/Lan.mrs"
  Lan_IP:
    <<: *IPCIDR
    path: ./rules/Lan_IP.mrs
    url: "https://raw.githubusercontent.com/Ayanamikizuna/Rule-for-OCD/master/rule/Clash/Lan/Lan_IP.mrs"

